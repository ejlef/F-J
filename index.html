<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F/J</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#050816,#111827);
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

/* Background glow */
body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle,#00eaff33,transparent 70%);
    animation:bgPulse 6s ease-in-out infinite;
}

.logo-container{
    position:relative;
    width:260px;
    height:260px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Outer rotating ring */
.ring{
    position:absolute;
    width:220px;
    height:220px;
    border-radius:50%;
    border:4px solid transparent;
    border-top:4px solid #00eaff;
    border-right:4px solid #6d5dfc;
    animation:spin 4s linear infinite;
    filter:drop-shadow(0 0 15px #00eaff);
}

.ring::before{
    content:"";
    position:absolute;
    inset:12px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,.08);
}

.ring::after{
    content:"";
    position:absolute;
    top:-6px;
    left:50%;
    width:12px;
    height:12px;
    background:#00eaff;
    border-radius:50%;
    transform:translateX(-50%);
    box-shadow:0 0 20px #00eaff;
}

/* Logo circle */
.logo{
    width:150px;
    height:150px;
    border-radius:50%;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(8px);
    border:2px solid rgba(255,255,255,.1);
    display:flex;
    justify-content:center;
    align-items:center;
    animation:float 3s ease-in-out infinite;
    box-shadow:
        0 0 20px rgba(0,234,255,.2),
        inset 0 0 20px rgba(255,255,255,.05);
}

/* Text */
.logo h1{
    font-size:58px;
    font-weight:900;
    color:#fff;
    letter-spacing:2px;
    text-shadow:
        0 0 10px #00eaff,
        0 0 25px #00eaff,
        0 0 50px #00eaff;
}

.logo span{
    color:#00eaff;
    animation:blink 1.2s infinite;
}

/* Floating particles */
.particle{
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    background:#00eaff;
    box-shadow:0 0 10px #00eaff;
    animation:orbit 5s linear infinite;
}

.p1{animation-delay:0s;}
.p2{animation-delay:1.5s;}
.p3{animation-delay:3s;}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
}

@keyframes blink{
    50%{opacity:.4;}
}

@keyframes bgPulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.2);}
}

@keyframes orbit{
    0%{
        transform:rotate(0deg) translateX(120px) rotate(0deg);
    }
    100%{
        transform:rotate(360deg) translateX(120px) rotate(-360deg);
    }
}
</style>
</head>
<body>

<div class="logo-container">

    <div class="ring"></div>

    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>

    <div class="logo">
        <h1>F<span>/</span>J</h1>
    </div>

</div>

</body>
</html>
